name: Build MANYLINUX High-Compatibility Binary

on:
  workflow_dispatch:

jobs:
  build-centos:
    name: Build Binary for CentOS 7+ (GLIBC 2.17)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Run Build inside Manylinux2014 Container
      run: |
        docker run --rm -v ${{ github.workspace }}:/src -w /src quay.io/pypa/manylinux2014_x86_64 bash -c "
          echo '=== 0. 解除 Git 容器挂载目录所有权限制 ===' &&
          git config --global --add safe.directory /src &&
          
          echo '=== 1. 安装全套底层编译依赖工具 ===' &&
          yum install -y openssl-devel libffi-devel krb5-devel gcc make wget zlib-devel bzip2-devel readline-devel sqlite-devel xz-devel &&
          
          echo '=== 2. 下载并现场编译带有 --enable-shared 的完整版 Python 3.10 ===' &&
          cd /tmp &&
          wget https://www.python.org/ftp/python/3.10.14/Python-3.10.14.tgz &&
          tar -xzf Python-3.10.14.tgz &&
          cd Python-3.10.14 &&
          ./configure --enable-shared --prefix=/usr/local &&
          make -j\$(nproc) &&
          make altinstall &&
          
          echo '=== 3. 💥 核心一步：强行嫁接官方自带的 SSL 动态库组件 ===' &&
          cp -f /opt/python/cp310-cp310/lib/python3.10/lib-dynload/_ssl*.so /usr/local/lib/python3.10/lib-dynload/ &&
          cp -f /opt/python/cp310-cp310/lib/python3.10/lib-dynload/_hashlib*.so /usr/local/lib/python3.10/lib-dynload/ &&
          
          echo '=== 4. 配置动态共享库路径 ===' &&
          echo '/usr/local/lib' > /etc/ld.so.conf.d/local.conf &&
          ldconfig &&
          
          echo '=== 5. 使用全新健全的 Python 3.10 环境安装依赖 ===' &&
          cd /src &&
          /usr/local/bin/python3.10 -m pip install --upgrade pip setuptools wheel &&
          /usr/local/bin/python3.10 -m pip install pyinstaller pillow &&
          /usr/local/bin/python3.10 -m pip install . &&
          
          echo '=== 6. 严格按照原厂 spec 配置文件压制二进制 ===' &&
          /usr/local/bin/python3.10 -m PyInstaller netexec.spec &&
          
          echo '=== 7. 修改产物权限 ===' &&
          chmod -R 777 dist/
        "

    - name: Upload CentOS High-Compatibility Binary
      uses: actions/upload-artifact@v4
      with:
        name: nxc-centos-compat
        path: dist/nxc
