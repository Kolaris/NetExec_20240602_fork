name: Build CentOS High-Compatibility Binary

on:
  workflow_dispatch: # 支持手动一键触发

jobs:
  build-centos:
    name: Build in Manylinux (CentOS Stream/AlmaLinux) Environment
    runs-on: ubuntu-latest
    
    # 🔥 升级为现代高兼容性 manylinux 镜像，彻底避开老旧系统调用被宿主机内核掐死的巨坑
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 强制切到镜像内自带的现代稳定 Python 环境
      - name: Setup Build Environment Variables
        run: |
          echo "/opt/python/cp311-cp311/bin" >> $GITHUB_PATH
          echo "PATH=/opt/python/cp311-cp311/bin:$PATH" >> $GITHUB_ENV

      - name: Install System Dependencies
        run: |
          # 现代镜像使用 dnf 替代 yum，安装底层网络与安全加密协议库
          dnf install -y openssl-devel libffi-devel krb5-devel gcc

      - name: Install Tools & Dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install poetry pyinstaller
          poetry config virtualenvs.create false
          poetry install --no-root --without dev

      - name: Execute PyInstaller Packing
        run: |
          # 使用 PyInstaller 压制单文件，并强行捕获可能的底层错误
          pyinstaller --clean \
            --onefile \
            --name nxc_centos \
            --add-data "data:data" \
            --add-data "protocols:protocols" \
            --add-data "modules:modules" \
            netexec.py

      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4
        with:
          name: netexec-centos-amd64-binary
          path: dist/nxc_centos
