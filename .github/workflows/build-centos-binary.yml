name: Build CentOS Binaries

on:
  workflow_dispatch:

jobs:
  build:
    name: Building Binary on ${{ matrix.job_name }}
    runs-on: ${{ matrix.os == 'centos-high-compat' && 'ubuntu-latest' || matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, centos-high-compat, macOS-latest, macos-26-intel, windows-latest]
        python-version: ["3.13"]
        include:
          - os: ubuntu-latest
            job_name: ubuntu-latest
          - os: centos-high-compat
            job_name: centos-high-compat
          - os: macOS-latest
            job_name: macOS-latest
          - os: macos-26-intel
            job_name: macos-26-intel
          - os: windows-latest
            job_name: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: NetExec set up python on ${{ matrix.os }}
      if: matrix.os != 'centos-high-compat'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # 1. 官方原生的打包逻辑
    - name: Build Native Binary
      if: matrix.os != 'centos-high-compat'
      run: |
        pip install pyinstaller pillow
        pip install .
        pyinstaller netexec.spec

    # 2. 🔥 专属 CentOS 的编译逻辑（使用自带独立共享库的系统 Python）
    - name: Build High-Compatibility Binary for CentOS
      if: matrix.os == 'centos-high-compat'
      run: |
        docker run --rm -v ${{ github.workspace }}:/src -w /src quay.io/pypa/manylinux_2_28_x86_64 bash -c "
          echo '=== 0. 解除 Git 容器挂载目录所有权限制 ===' &&
          git config --global --add safe.directory /src &&
          
          echo '=== 1. 使用 dnf 安装系统级带共享库的 Python3 ===' &&
          dnf install -y python3-devel python3-pip openssl-devel libffi-devel krb5-devel gcc &&
          
          echo '=== 2. 升级系统 pip 并安装打包工具 ===' &&
          python3 -m pip install --upgrade pip setuptools wheel &&
          python3 -m pip install pyinstaller pillow &&
          
          echo '=== 3. 安装 NetExec 及其依赖包 ===' &&
          python3 -m pip install . &&
          
          echo '=== 4. 严格按照官方 spec 配置文件压制二进制 ===' &&
          python3 -m pyinstaller netexec.spec &&
          
          echo '=== 5. 修改产物权限，确保宿主机可读 ===' &&
          chmod -R 777 dist/
        "

    - name: Upload Windows Binary
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: nxc-windows.exe
        path: dist/nxc.exe

    # 3. 非 Windows 系统上传，同时兼容我们新加的 CentOS 产物
    - name: Upload Nix/OSx Binary
      if: matrix.os != 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: nxc-${{ matrix.os }}
        path: dist/nxc
