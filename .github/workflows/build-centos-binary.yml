name: Build Binaries

on:
  workflow_dispatch:

jobs:
  build:
    name: Building Binary on ${{ matrix.job_name }}
    # 🔥 核心修正 1：如果名字是 centos，宿主机强制分分配 ubuntu-latest，否则按原样分配
    runs-on: ${{ matrix.os == 'centos-high-compat' && 'ubuntu-latest' || matrix.os }}
    strategy:
      matrix:
        # 这里保留你喜欢的名字，用来在界面上做区分
        os: [ubuntu-latest, centos-high-compat, macOS-latest, macos-26-intel, windows-latest]
        python-version: ["3.13"]
        include:
          # 🔥 核心修正 2：为每个系统定义一个好看的展示名字
          - os: ubuntu-latest
            job_name: ubuntu-latest
          - os: centos-high-compat
            job_name: centos-high-compat
          - os: macOS-latest
            job_name: macOS-latest
          - os: macos-26-intel
            job_name: macos-26-intel
          - os: windows-latest
            job_name: windows-latest

    steps:
    - uses: actions/checkout@v4

    # 只有不是 centos 编译时，才使用官方原生的 setup-python
    - name: NetExec set up python on ${{ matrix.os }}
      if: matrix.os != 'centos-high-compat'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # 1. 官方原生的打包逻辑
    - name: Build Native Binary
      if: matrix.os != 'centos-high-compat'
      run: |
        pip install pyinstaller pillow
        pip install .
        pyinstaller netexec.spec

    # 2. 专属 CentOS 的编译逻辑
    - name: Build High-Compatibility Binary for CentOS
      if: matrix.os == 'centos-high-compat'
      run: |
        docker run --rm -v ${{ github.workspace }}:/src -w /src quay.io/pypa/manylinux_2_28_x86_64 bash -c "
          export PATH=/opt/python/cp311-cp311/bin:\$PATH &&
          dnf install -y openssl-devel libffi-devel krb5-devel gcc &&
          pip install --upgrade pip setuptools wheel &&
          pip install pyinstaller pillow &&
          pip install . &&
          pyinstaller netexec.spec &&
          chmod -R 777 dist/
        "

    - name: Upload Windows Binary
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: nxc-windows.exe
        path: dist/nxc.exe

    # 3. 非 Windows 系统上传，同时兼容我们新加的 CentOS 产物
    - name: Upload Nix/OSx Binary
      if: matrix.os != 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: nxc-${{ matrix.os }}
        path: dist/nxc
